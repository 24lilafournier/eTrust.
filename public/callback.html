<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trust — Connexion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #F5F0E8; color: #2C1810; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
.card { background: #fff; border: 0.5px solid #D4CFC6; border-radius: 16px; padding: 32px; width: 100%; max-width: 380px; }
h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 24px; }
.field { margin-bottom: 14px; }
.field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
.field input { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid #D4CFC6; border-radius: 10px; background: #fff; color: #2C1810; }
.field input:focus { outline: none; border-color: #6B1A2A; }
.btn { width: 100%; padding: 11px; background: #6B1A2A; color: #F5F0E8; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
.btn:hover { opacity: 0.85; }
.msg { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 8px; }
.msg.err { background: #FCEBEB; color: #A32D2D; }
.msg.ok { background: #E1F5EE; color: #0F6E56; }
.loading { text-align: center; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6B1A2A; margin: 0 3px; animation: bop 1s infinite; }
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
</style>
</head>
<body>

<div id="loading-view" class="card loading">
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <p style="font-size:13px;color:#888;margin-top:12px">Connexion en cours…</p>
</div>

<div id="password-view" class="card" style="display:none">
  <h1>Créer ton mot de passe</h1>
  <div class="sub">Choisis un mot de passe pour accéder à Trust.</div>
  <div class="field">
    <label>Nouveau mot de passe</label>
    <input type="password" id="pwd1" placeholder="Min. 8 caractères" />
  </div>
  <div class="field">
    <label>Confirmer le mot de passe</label>
    <input type="password" id="pwd2" placeholder="Répète ton mot de passe" onkeydown="if(event.key==='Enter')setPassword()" />
  </div>
  <button class="btn" onclick="setPassword()">Valider</button>
  <div id="pwd-msg"></div>
</div>

<script>
const SUPABASE_URL = "https://plucbphvumuxdprajwag.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsdWNicGh2dW11eGRwcmFqd2FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODQ3ODUsImV4cCI6MjA5MTY2MDc4NX0.dTjVhlmcklYGUt1mhFv9yIq6tz_wJtMnJRUlNxKoLbk";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function init() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const type = params.get('type');
  const accessToken = params.get('access_token');
  const refreshToken = params.get('refresh_token');

  // Invitation ou reset password → afficher formulaire mot de passe
  if ((type === 'recovery' || type === 'invite') && accessToken) {
    await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
    document.getElementById('loading-view').style.display = 'none';
    document.getElementById('password-view').style.display = 'block';
    return;
  }

  // Connexion normale → rediriger vers coach.html
  const { data: { session } } = await sb.auth.getSession();
  if (session) { window.location.href = '/coach.html'; return; }
  setTimeout(async () => {
    await sb.auth.getSession();
    window.location.href = '/coach.html';
  }, 1500);
}

async function setPassword() {
  const pwd1 = document.getElementById('pwd1').value;
  const pwd2 = document.getElementById('pwd2').value;
  const msg = document.getElementById('pwd-msg');
  if (pwd1.length < 8) { msg.innerHTML = '<div class="msg err">Minimum 8 caractères.</div>'; return; }
  if (pwd1 !== pwd2) { msg.innerHTML = '<div class="msg err">Les mots de passe ne correspondent pas.</div>'; return; }
  const { error } = await sb.auth.updateUser({ password: pwd1 });
  if (error) { msg.innerHTML = `<div class="msg err">${error.message}</div>`; return; }
  msg.innerHTML = '<div class="msg ok">Mot de passe créé. Redirection…</div>';
  setTimeout(() => { window.location.href = '/coach.html'; }, 1500);
}

init();
</script>
</body>
</html>
