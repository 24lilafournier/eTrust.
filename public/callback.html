<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trust — Connexion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #F5F0E8; color: #2C1810; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.msg { text-align: center; }
.msg p { font-size: 14px; color: #888; margin-top: 8px; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6B1A2A; margin: 0 3px; animation: bop 1s infinite; }
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="msg">
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <p>Connexion en cours…</p>
</div>
<script>
const SUPABASE_URL = "https://dmpqfzzafvceqgunqxuy.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtcHFmenphZnZjZXFndW5xeHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNTEwNDUsImV4cCI6MjA5MTYyNzA0NX0.ACpxJ2VudPg3jSON8TQVTQoYnhEjNLB9Ui5zg2boK98";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function handleCallback() {
  // Supabase gère automatiquement les tokens dans l'URL
  const { data: { session }, error } = await sb.auth.getSession();
  if (session) {
    window.location.href = '/coach.html';
  } else {
    // Attendre un peu que Supabase traite les tokens
    setTimeout(async () => {
      const { data: { session: s2 } } = await sb.auth.getSession();
      if (s2) {
        window.location.href = '/coach.html';
      } else {
        window.location.href = '/coach.html';
      }
    }, 1500);
  }
}

handleCallback();
</script>
</body>
</html>
