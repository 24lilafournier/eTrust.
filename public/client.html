<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trust</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #F5F0E8; color: #2C1810; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
.shell { width: 100%; max-width: 520px; background: #fff; border: 0.5px solid #D4CFC6; border-radius: 16px; overflow: hidden; min-height: 580px; display: flex; flex-direction: column; box-shadow: 0 2px 20px rgba(0,0,0,0.06); }
.header { padding: 14px 18px; background: #F5F0E8; border-bottom: 0.5px solid #D4CFC6; display: flex; align-items: center; gap: 12px; }
.av { width: 36px; height: 36px; border-radius: 50%; background: #6B1A2A; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: #F5F0E8; flex-shrink: 0; }
.hname { font-size: 14px; font-weight: 500; }
.hsub { font-size: 12px; color: #888; }
.hdot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; margin-left: auto; }
.onb { padding: 28px; flex: 1; display: flex; flex-direction: column; }
.onb-title { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
.onb-sub { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 24px; }
.onb-f { margin-bottom: 16px; }
.onb-f label { font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
.onb-f input { width: 100%; font-size: 14px; padding: 11px 13px; border: 0.5px solid #D4CFC6; border-radius: 10px; background: #fff; color: #2C1810; transition: border-color 0.15s; }
.onb-f input:focus { outline: none; border-color: #6B1A2A; }
.start-btn { padding: 13px; background: #6B1A2A; color: #F5F0E8; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
.start-btn:hover { opacity: 0.85; }
.msgs { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; min-height: 360px; max-height: 420px; }
.mu { align-self: flex-end; max-width: 80%; background: #6B1A2A; color: #F5F0E8; padding: 11px 15px; border-radius: 14px 14px 4px 14px; font-size: 14px; line-height: 1.5; }
.mai { align-self: flex-start; max-width: 88%; background: #F5F0E8; border: 0.5px solid #D4CFC6; padding: 13px 16px; border-radius: 14px 14px 14px 4px; font-size: 14px; line-height: 1.65; }
.mai .rephrase { font-size: 13px; color: #888; font-style: italic; margin-bottom: 7px; }
.mai .reframe { margin-bottom: 8px; }
.mai .q { font-weight: 500; margin-bottom: 5px; }
.mai .micro { margin-top: 11px; padding: 9px 13px; background: #fff; border: 0.5px solid #D4CFC6; border-radius: 8px; font-size: 13px; color: #666; }
.mai .micro::before { content: "→ "; color: #6B1A2A; font-weight: 500; }
.mai .rappel { font-size: 12px; color: #aaa; font-style: italic; margin-bottom: 7px; }
.dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #aaa; margin: 0 2px; animation: bop 1s infinite; }
.dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.inp-area { padding: 12px 16px; border-top: 0.5px solid #D4CFC6; display: flex; gap: 8px; background: #fff; }
.inp-area input { flex: 1; padding: 11px 14px; font-size: 14px; border: 0.5px solid #D4CFC6; border-radius: 10px; background: #F5F0E8; color: #2C1810; transition: border-color 0.15s; }
.inp-area input:focus { outline: none; border-color: #6B1A2A; background: #fff; }
.send-btn { padding: 11px 16px; background: #6B1A2A; color: #F5F0E8; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }
.send-btn:disabled { opacity: 0.4; cursor: default; }
.error-screen { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; padding: 40px; text-align: center; }
.error-screen .big { font-size: 16px; font-weight: 500; }
.error-screen .small { font-size: 13px; color: #888; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="av">T</div>
    <div><div class="hname">Trust</div><div class="hsub">Ton assistant entre les séances</div></div>
    <div class="hdot"></div>
  </div>

  <div id="error-screen" class="error-screen" style="display:none">
    <div class="big">Lien invalide</div>
    <div class="small">Ce lien ne correspond à aucun profil actif.<br>Contacte ton coach.</div>
  </div>

  <div id="onboarding" class="onb" style="display:none">
    <div class="onb-title">Avant de commencer</div>
    <div class="onb-sub">Trust prolonge le travail avec ton coach.<br>3 questions pour calibrer la session.</div>
    <div class="onb-f"><label>Ton objectif en ce moment</label><input type="text" id="onb-obj" placeholder="Ex : décider si je quitte mon poste" /></div>
    <div class="onb-f"><label>Ce qui te bloque</label><input type="text" id="onb-bloc" placeholder="Ex : j'ai peur de me tromper" /></div>
    <div class="onb-f"><label>Sur quoi tu travailles avec ton coach</label><input type="text" id="onb-coach" placeholder="Ex : clarifier ma prochaine étape" /></div>
    <button class="start-btn" onclick="startSession()">Commencer →</button>
  </div>

  <div id="chat-area" style="display:none;flex-direction:column;flex:1">
    <div class="msgs" id="msgs"></div>
    <div class="inp-area">
      <input type="text" id="ci" placeholder="Ce que tu vis maintenant…" onkeydown="if(event.key==='Enter')send()" />
      <button class="send-btn" id="sbtn" onclick="send()">→</button>
    </div>
  </div>
</div>

<script>
function esc(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function escapeHTML(str) {
  return str.replace(/[&<>"']/g, m => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  }[m]));
}

const SUPABASE_URL = "https://plucbphvumuxdprajwag.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsdWNicGh2dW11eGRwcmFqd2FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODQ3ODUsImV4cCI6MjA5MTY2MDc4NX0.dTjVhlmcklYGUt1mhFv9yIq6tz_wJtMnJRUlNxKoLbk";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let clientData = null;
let coachProtocoles = [];
let sessionCtx = {};
let history = [];
let busy = false;
let depthCount = 0; // compteur de profondeur d'exploration par sujet

const slug = new URLSearchParams(window.location.search).get('c');
const token = new URLSearchParams(window.location.search).get('t');

async function init() {
  if (!slug || !token) { showError(); return; }

  // Charger le profil client
  const { data: client, error } = await sb.from('clients')
    .select('*')
    .eq('slug', slug)
    .eq('token', token)
    .eq('actif', true)
    .single();

  if (error || !client) { showError(); return; }
  clientData = client;

  // Charger les protocoles custom du coach associé
  const { data: coach } = await sb.from('coaches')
    .select('protocoles_custom')
    .eq('id', client.coach_id)
    .single();
  coachProtocoles = coach?.protocoles_custom || [];

  document.getElementById('onboarding').style.display = 'flex';
}

function showError() {
  document.getElementById('error-screen').style.display = 'flex';
}

function startSession() {
  const obj = document.getElementById('onb-obj').value.trim();
  const bloc = document.getElementById('onb-bloc').value.trim();
  const coach = document.getElementById('onb-coach').value.trim();
  if (!obj || !bloc) { alert("Objectif et blocage requis."); return; }
  sessionCtx = { objectif: obj, blocage: bloc, coaching: coach };
  depthCount = 0;
  document.getElementById('onboarding').style.display = 'none';
  const ca = document.getElementById('chat-area');
  ca.style.display = 'flex'; ca.style.flexDirection = 'column'; ca.style.flex = '1';
  const init = {
    proto: "neutre", rephrase: null,
    reframe: `Session démarrée. Objectif : ${obj}.`,
    questions: ["Qu'est-ce qui s'est passé depuis ta dernière séance ?"],
    micro: null,
    rappel: clientData.decisions?.length ? "Décisions en vigueur : " + clientData.decisions.join(" / ") : null
  };
  renderMsg(init);
}

async function send() {
  const inp = document.getElementById('ci');
  const msg = inp.value.trim();
  if (!msg || busy) return;
  if (history.length > 15) {
    alert("Session trop longue — reprends avec ton coach.");
    return;
  }
  inp.value = ''; busy = true;
  document.getElementById('sbtn').disabled = true;

  const um = document.createElement('div'); um.className = 'mu'; um.textContent = msg;
  document.getElementById('msgs').appendChild(um); scroll();

  const { error: errUser } = await sb.from('messages').insert({ client_id: clientData.id, role: 'user', content: msg });
  if (errUser) { console.error(errUser); alert("Erreur serveur"); busy = false; document.getElementById('sbtn').disabled = false; return; }
  history.push({ role: "user", content: msg });
  depthCount++;
  appendLoading();

  try {
    const res = await fetch("/api/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: buildPrompt(), messages: history })
    });
    const data = await res.json();
    const raw = data.content?.map(b => b.text || "").join("") || "";

    // Parser le nouveau format texte libre avec balise [PROTO:x]
    let parsed;
    const protoMatch = raw.match(/\[PROTO:([\w]+)\]/i);
    const proto = protoMatch ? protoMatch[1].toLowerCase() : 'neutre';
    const text = raw.replace(/\[PROTO:[\w]+\]/gi, '').trim();

    if (text) {
      parsed = { text, proto };
    } else {
      // Fallback si réponse vide ou malformée
      parsed = { text: getFallback(), proto: 'neutre' };
    }

    removeLoading();
    renderMsg(parsed);
    history.push({ role: "assistant", content: raw });
    const { error: errAi } = await sb.from('messages').insert({ client_id: clientData.id, role: 'assistant', content: raw, proto });
    if (errAi) console.error(errAi);

  } catch(e) {
    removeLoading();
    const em = document.createElement('div'); em.className = 'mai'; em.textContent = "Erreur de connexion.";
    document.getElementById('msgs').appendChild(em);
  }
  busy = false; document.getElementById('sbtn').disabled = false;
}

function renderMsg(p) {
  const d = document.getElementById('msgs');
  const m = document.createElement('div'); m.className = 'mai';

  // Nouveau format : p peut être { text: "...", proto: "..." } ou l'ancien format JSON
  if (p.text) {
    // Format texte libre : on convertit les sauts de ligne en <br>
    // et on met en gras les questions (lignes finissant par ?)
    const lines = p.text.split('\n').filter(l => l.trim());
    let h = '';
    if (p.rappel) h += `<div class="rappel">${esc(p.rappel)}</div>`;
    lines.forEach(line => {
      const trimmed = line.trim();
      if (trimmed.endsWith('?')) {
        h += `<div class="q">${esc(trimmed)}</div>`;
      } else if (trimmed.startsWith('→')) {
        h += `<div class="micro">${esc(trimmed.slice(1).trim())}</div>`;
      } else {
        h += `<div class="reframe">${esc(trimmed)}</div>`;
      }
    });
    m.innerHTML = h;
  } else {
    // Fallback ancien format JSON (startSession initial)
    let h = '';
    if (p.rappel) h += `<div class="rappel">${esc(p.rappel)}</div>`;
    if (p.rephrase) h += `<div class="rephrase">${esc(p.rephrase)}</div>`;
    if (p.reframe) h += `<div class="reframe">${esc(p.reframe)}</div>`;
    if (p.questions?.length) p.questions.forEach(q => h += `<div class="q">${esc(q)}</div>`);
    if (p.micro) h += `<div class="micro">${esc(p.micro)}</div>`;
    m.innerHTML = h;
  }

  d.appendChild(m); scroll();
}

function appendLoading() {
  const d = document.getElementById('msgs');
  const m = document.createElement('div'); m.className = 'mai'; m.id = 'lm';
  m.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  d.appendChild(m); scroll();
}
function removeLoading() { const e = document.getElementById('lm'); if(e) e.remove(); }
function scroll() { const d = document.getElementById('msgs'); if(d) d.scrollTop = d.scrollHeight; }

function getFallback() {
  const ton = clientData?.ton;
  if (ton === "challengeant") return `Formule en une phrase ce qui te bloque sur "${sessionCtx.objectif}".`;
  if (ton === "cadrant") return `Qu'est-ce qui est actionnable aujourd'hui sur "${sessionCtx.objectif}" ?`;
  return `Qu'est-ce qui te pèse le plus par rapport à "${sessionCtx.objectif}" ?`;
}

function buildPrompt() {
  const c = clientData;
  let customBlock = '';
  coachProtocoles.forEach((p, i) => {
    if (!p.nom) return;
    const code = i === 0 ? 'P5' : 'P6';
    customBlock += `\n${code} ${p.nom.toUpperCase()} (déclencheurs : ${p.declencheurs}) : ${p.etapes.split('\n').filter(l=>l.trim()).join(' · ')} — Ton : ${p.ton}`;
  });

  const customProtoValues = coachProtocoles.filter(p=>p.nom).map((_,i) => i===0?'p5':'p6').join('|');

  // Extraire les questions déjà posées pour anti-répétition
  const alreadyAsked = history
    .filter(m => m.role === 'assistant')
    .map(m => m.content)
    .join('\n');

  const depth = depthCount;
  const redirectNow = depth >= 3;

  return `Tu es Trust, un outil de continuité entre les séances de coaching. Tu n'es PAS un coach IA — tu es un amplificateur du coach humain.

Ta fonction : créer des questions que seul le coach peut vraiment résoudre. Pas résoudre. Pas interpréter. Pas conclure.

CONTEXTE
Objectif : ${sessionCtx.objectif}
Blocage : ${sessionCtx.blocage}
Décisions prises : ${(c.decisions||[]).join(" / ") || "aucune"}
Patterns : ${(c.patterns||[]).join(" / ") || "aucun"}
Profondeur d'exploration actuelle : ${depth} échange(s) sur ce sujet

STYLE COACH
Ton : ${c.ton} | Posture : ${c.posture} | Priorité : ${c.priorite}
Interdits : ${(c.interdits||[]).join(", ") || "aucun"}

PROTOCOLES — mets [PROTO:x] à la fin
P1 clarification — confusion, trop d'options
P2 peur — blocage émotionnel
P3 action — procrastination
P4 crise — détresse forte
neutre — exploration légère${customBlock}

RÈGLE DE PROFONDEUR — CRITIQUE
${redirectNow ? `Profondeur maximale atteinte (${depth} échanges). Tu DOIS rediriger vers le coach maintenant.` : `Tu as encore ${3 - depth} échange(s) avant redirection obligatoire.`}

Si tu détectes : émotion forte / boucle répétitive / confusion élevée / question qui touche à l'identité ou aux causes profondes
→ redirige immédiatement, même avant la limite

COMMENT REDIRIGER (naturel, pas mécanique) :
- "Ça c'est quelque chose à creuser avec [coach]. Tu peux noter ça pour la prochaine séance ?"
- "Je sens qu'on touche à quelque chose d'important. C'est exactement le genre de sujet pour une séance."
- "Je vais m'arrêter là — c'est trop central pour que je l'explore avec toi sans ton coach."

COMMENT TU RÉPONDS (hors redirection)
Tu écris comme quelqu'un qui connaît bien la personne. Direct, attentif, sans bullshit.
- Elle tourne en rond → coupe court, renvoie au coach
- Elle exprime quelque chose de lourd → accuse réception en une phrase, pose une question sur l'impact réel, oriente vers la séance
- Elle analyse → neutre, factuel, nomme ce que tu observes sans l'interpréter

UNE SEULE QUESTION par réponse. Courte. Imparfaite. Humaine.
Quand c'est pertinent, termine par une phrase qui oriente vers le coach ou la prochaine séance.

EXEMPLES — structure (pas mot pour mot)

Situation : "Je suis en dépression"
✓ "Tu en as déjà parlé à quelqu'un ?"
✓ "Ça a l'air lourd. Comment ça se manifeste dans ton travail en ce moment ?"
✓ "Je t'entends. Dans cet état-là, qu'est-ce qui reste possible pour toi ?"
→ Puis : "C'est important à amener en séance."

Situation : exploration profonde (3e échange sur même sujet)
✓ "On commence à toucher à quelque chose de plus profond. C'est le bon endroit pour en parler avec ton coach."

CE QUI EST INTERDIT :
- Interpréter : "Est-ce lié à ton besoin de validation ?" / "C'est peut-être parce que…"
- Conclure : donner "la réponse", résoudre le problème
- Questions à tiroirs : "c'est X, Y, Z ou autre chose ?"
- "même à 10%" / "même à petite échelle" / "qu'est-ce qui se joue"
- "Ça c'est concret." / "Je t'entends. Et en même temps…"
- Plus d'une question par message
- Listes à tirets dans la réponse
- Répéter une question déjà posée. Déjà posées : ${alreadyAsked ? alreadyAsked.substring(0, 500) : "aucune"}

LONGUEUR : 1 à 3 lignes. Pas plus.
Tutoie toujours.
Termine par [PROTO:clarification|peur|action|crise|neutre${customProtoValues ? '|'+customProtoValues : ''}]`;
}

init();
</script>
</body>
</html>
