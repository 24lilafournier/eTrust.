<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trust — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #F5F0E8; color: #2C1810; min-height: 100vh; padding: 32px 16px; }
.wrap { max-width: 700px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 28px; }
.card { background: #fff; border: 0.5px solid #D4CFC6; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
.field { margin-bottom: 12px; }
.field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
.field input { width: 100%; padding: 8px 10px; font-size: 13px; border: 0.5px solid #D4CFC6; border-radius: 8px; background: #fff; color: #2C1810; }
.btn { padding: 9px 18px; background: #6B1A2A; color: #F5F0E8; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn:hover { opacity: 0.85; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.msg { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 8px; }
.msg.ok { background: #E1F5EE; color: #0F6E56; }
.msg.err { background: #FCEBEB; color: #A32D2D; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
td, th { padding: 8px 10px; text-align: left; border-bottom: 0.5px solid #eee; }
th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; font-weight: 500; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.badge-ok { background: #E1F5EE; color: #0F6E56; }
.badge-ko { background: #FCEBEB; color: #A32D2D; }

/* LOGIN */
.login-wrap { max-width: 360px; margin: 80px auto; background: #fff; border: 0.5px solid #D4CFC6; border-radius: 12px; padding: 28px; }
.login-wrap h1 { font-size: 18px; margin-bottom: 4px; }
.login-wrap .sub { margin-bottom: 20px; }
</style>
</head>
<body>

<div id="login-view" class="login-wrap">
  <h1>Trust — Admin</h1>
  <div class="sub">Accès réservé</div>
  <div class="field"><label>Email</label><input type="email" id="login-email" /></div>
  <div class="field"><label>Mot de passe</label><input type="password" id="login-pwd" /></div>
  <button class="btn" onclick="login()" style="width:100%;margin-top:4px">Connexion</button>
  <div id="login-msg"></div>
</div>

<div id="admin-view" class="wrap" style="display:none">
  <h1>Trust — Admin</h1>
  <div class="sub">Gestion des coachs</div>

  <div class="card">
    <h2>Créer un compte coach</h2>
    <div class="field"><label>Nom</label><input type="text" id="new-nom" placeholder="Ex : Sophie Martin" /></div>
    <div class="field"><label>Email</label><input type="email" id="new-email" placeholder="coach@email.com" /></div>
    <div class="field"><label>Mot de passe temporaire</label><input type="password" id="new-pwd" placeholder="Min. 8 caractères" /></div>
    <button class="btn" onclick="createCoach()">Créer le compte</button>
    <div id="create-msg"></div>
  </div>

  <div class="card">
    <h2>Coachs actifs</h2>
    <table>
      <thead><tr><th>Nom</th><th>Email</th><th>Statut</th><th>Action</th></tr></thead>
      <tbody id="coaches-list"><tr><td colspan="4" style="color:#aaa">Chargement…</td></tr></tbody>
    </table>
  </div>

  <button onclick="logout()" style="background:none;border:none;cursor:pointer;font-size:13px;color:#aaa;margin-top:8px">Déconnexion</button>
</div>

<script>
const SUPABASE_URL = "https://plucbphvumuxdprajwag.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsdWNicGh2dW11eGRwcmFqd2FnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODQ3ODUsImV4cCI6MjA5MTY2MDc4NX0.dTjVhlmcklYGUt1mhFv9yIq6tz_wJtMnJRUlNxKoLbk";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function esc(str) {
  return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

async function login() {
  if (login._busy) return; login._busy = true;
  try {
    const email = document.getElementById('login-email').value;
    const pwd = document.getElementById('login-pwd').value;
    const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) { const d = document.createElement('div'); d.className = 'msg err'; d.textContent = error.message; document.getElementById('login-msg').replaceChildren(d); return; }
    showAdmin();
  } finally { login._busy = false; }
}

async function showAdmin() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user || user.email !== "TON_EMAIL_ADMIN") {
    alert("Accès refusé");
    return;
  }
  // Vérifier que c'est bien toi (admin) — à adapter avec ton email
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('admin-view').style.display = 'block';
  loadCoaches();
}

async function loadCoaches() {
  const { data, error } = await sb.from('coaches').select('*').order('created_at', { ascending: false });
  if (error) return;
  const tbody = document.getElementById('coaches-list');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" style="color:#aaa">Aucun coach</td></tr>'; return; }
  tbody.innerHTML = data.map(c => `
    <tr>
      <td>${esc(c.nom)}</td>
      <td>${esc(c.email)}</td>
      <td><span class="badge ${c.actif ? 'badge-ok' : 'badge-ko'}">${c.actif ? 'Actif' : 'Inactif'}</span></td>
      <td><button class="btn btn-sm" onclick="toggleCoach('${esc(c.id)}', ${c.actif ? 'true' : 'false'})">${c.actif ? 'Désactiver' : 'Activer'}</button></td>
    </tr>
  `).join('');
}

async function createCoach() {
  const nom = document.getElementById('new-nom').value.trim();
  const email = document.getElementById('new-email').value.trim();
  const pwd = document.getElementById('new-pwd').value;
  const msg = document.getElementById('create-msg');
  if (!nom || !email || !pwd) { msg.innerHTML = '<div class="msg err">Tous les champs sont requis.</div>'; return; }

  // Créer le compte auth Supabase
  // Note : nécessite la clé service_role pour créer des users côté admin
  // Pour le pilote, utiliser la fonction SQL ci-dessous dans Supabase
  msg.innerHTML = '<div class="msg ok">Crée le compte via Supabase Auth → Users → "Invite user", puis ajoute une ligne dans la table coaches avec son UUID.</div>';
  loadCoaches();
}

async function toggleCoach(id, actif) {
  if (toggleCoach._busy) return; toggleCoach._busy = true;
  try {
    const { error } = await sb.from('coaches').update({ actif: !actif }).eq('id', id);
    if (error) { console.error(error); alert("Erreur serveur"); return; }
    loadCoaches();
  } finally { toggleCoach._busy = false; }
}

async function logout() {
  await sb.auth.signOut();
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('admin-view').style.display = 'none';
}

// Vérifier session au chargement
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) showAdmin();
});
</script>
</body>
</html>
